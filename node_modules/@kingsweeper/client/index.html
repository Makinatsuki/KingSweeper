<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KingSweeper</title>
  </head>
  <body>
    <div id="app"></div>
    <div id="ui-overlay">
        <div id="lobby">
            <h1>KingSweeper</h1>
            <input type="text" id="room-input" placeholder="Room ID" value="default">
            <br>
            <button id="join-btn">Join Game</button>
        </div>
        <div id="status-bar">
            <span id="room-info"></span> | 
            <span id="color-info"></span> | 
            <span id="turn-info">Waiting for players...</span>
        </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
